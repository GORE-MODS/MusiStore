<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiStore™</title>
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-surface: #121212;
            --accent: #1db954;
            --text-main: #e0e0e0;
            --text-dim: #444; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: #222;
        }

        body { 
            background: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        /* GLASS SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        #sidebar {
            width: 300px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
        }

        /* LYRICS PANEL */
        #lyrics-panel {
            flex: 1;
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        #lyrics-panel.fullscreen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            border: none;
            background: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(40px);
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 0;
        }

        #lyrics-content {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 45vh 40px; 
            margin: 0 auto;
            box-sizing: border-box;
            text-align: left;
        }

        #lyrics-content::-webkit-scrollbar { display: none; }

        .lyric-line {
            font-size: 2.8em;
            font-weight: 800;
            line-height: 1.3;
            margin: 50px 0;
            cursor: pointer;
            width: 100%;
            word-wrap: break-word;
            
            color: rgba(255, 255, 255, 0.1); 
            background: linear-gradient(to right, #fff 50%, rgba(255, 255, 255, 0.1) 50%);
            background-size: 200% 100%;
            background-position: 100% 0;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            transition: background-position 0.7s cubic-bezier(0.4, 0, 0.2, 1), filter 0.4s, transform 0.4s;
            filter: blur(2px);
        }

        .lyric-line.active {
            filter: blur(0);
            background-position: 0% 0;
            transform: scale(1.05) translateX(10px);
        }

        .fs-toggle {
            position: absolute;
            top: 30px; right: 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            z-index: 1001;
        }

        /* LIBRARY */
        .album-list, .song-list { 
            display: block !important;
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.5s ease;
            padding: 0 20px; 
            border-left: 2px solid var(--accent); 
            margin-left: 20px; 
        }
        .show { max-height: 2000px !important; padding-bottom: 15px !important; }

        #main-stage { flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 140px; }
        .artist-block { margin-bottom: 12px; border-radius: 10px; background: var(--glass); }
        .artist-header { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; }
        .album-title { color: var(--text-dim); font-size: 0.85em; font-weight: 700; margin-top: 15px; cursor: pointer; }
        .song-row { padding: 10px 14px; border-radius: 6px; cursor: pointer; font-size: 0.9em; color: var(--text-dim); transition: 0.2s; }
        .song-row:hover { color: var(--accent); background: rgba(29, 185, 84, 0.1); }

        #player-bar {
            position: fixed; bottom: 0; width: 100%; height: 100px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 40px; box-sizing: border-box; z-index: 1000;
        }

        .now-playing { width: 350px; }
        audio { flex: 1; filter: invert(1); opacity: 0.7; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="color:var(--accent); font-weight:900; font-size: 1.5em; margin-bottom:20px;">MusiStore</div>
        <input type="text" id="search-input" placeholder="Search library..." onkeyup="filterLibrary()" style="background:#111; border:1px solid #222; padding:10px; color:#fff; border-radius:5px; margin-bottom: 20px;">
        <div id="lib-nav"></div>
    </div>

    <div id="main-stage">
        <div id="library-container"></div>
    </div>

    <div id="lyrics-panel">
        <button class="fs-toggle" onclick="toggleFS()">FULLSCREEN (F)</button>
        <div id="lyrics-content">Select a track...</div>
    </div>

    <div id="player-bar">
        <div class="now-playing">
            <div id="track-title" style="font-weight: 800;">Not Playing</div>
            <div id="track-meta" style="font-size: 0.8em; color: var(--text-dim);">Select a track</div>
        </div>
        <audio id="audio-element" controls></audio>
    </div>

    <script>
        const API_BASE = `${window.location.origin}/api`;
        let fullLibrary = {};
        let syncData = [];
        let currentAlbumSongs = [];
        let currentArtist = "";
        let currentAlbumName = "";

        async function init() {
            const res = await fetch(`${API_BASE}/library`);
            fullLibrary = await res.json();
            renderLibrary(fullLibrary);
        }

        function toggleFS() {
            document.getElementById('lyrics-panel').classList.toggle('fullscreen');
            const btn = document.querySelector('.fs-toggle');
            btn.textContent = document.getElementById('lyrics-panel').classList.contains('fullscreen') ? "CLOSE (F)" : "FULLSCREEN (F)";
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f' && e.target.tagName !== 'INPUT') toggleFS();
        });

        function renderLibrary(data) {
            const container = document.getElementById('library-container');
            container.innerHTML = '';
            for (const artist in data) {
                const block = document.createElement('div');
                block.className = 'artist-block';
                const header = document.createElement('div');
                header.className = 'artist-header';
                header.innerHTML = `<span>${artist}</span> <span>▼</span>`;
                
                const albumList = document.createElement('div');
                albumList.className = 'album-list';
                header.onclick = () => albumList.classList.toggle('show');

                for (const album in data[artist]) {
                    const group = document.createElement('div');
                    const title = document.createElement('div');
                    title.className = 'album-title';
                    title.innerHTML = `💿 ${album}`;
                    
                    const songList = document.createElement('div');
                    songList.className = 'song-list';
                    title.onclick = (e) => { e.stopPropagation(); songList.classList.toggle('show'); };

                    data[artist][album].forEach(song => {
                        const row = document.createElement('div');
                        row.className = 'song-row';
                        row.textContent = song.title;
                        row.onclick = (e) => { 
                            e.stopPropagation(); 
                            // Store current context for auto-play
                            currentAlbumSongs = data[artist][album];
                            currentArtist = artist;
                            currentAlbumName = album;
                            play(song.id, song.title, artist); 
                        };
                        songList.appendChild(row);
                    });
                    group.append(title, songList);
                    albumList.appendChild(group);
                }
                block.append(header, albumList);
                container.appendChild(block);
            }
        }

        async function play(id, title, artist) {
            const player = document.getElementById('audio-element');
            const lyricBox = document.getElementById('lyrics-content');
            document.getElementById('track-title').textContent = title;
            document.getElementById('track-meta').textContent = artist;
            
            const hue = Math.floor(Math.random() * 360);
            document.body.style.background = `radial-gradient(circle at right, hsla(${hue}, 30%, 10%, 1) 0%, #050505 70%)`;

            player.src = `${API_BASE}/stream/${id}`;
            player.play();
            
            lyricBox.innerHTML = "Fetching...";
            syncData = [];
            const res = await fetch(`${API_BASE}/lyrics/${id}`);
            const data = await res.json();
            
            lyricBox.innerHTML = '';
            const lines = data.lyrics.split('\n');
            const timePattern = /\[(\d+):(\d+\.\d+)\]/;

            lines.forEach(line => {
                const match = timePattern.exec(line);
                if (match) {
                    const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
                    const text = line.replace(timePattern, '').trim();
                    if (text) {
                        const div = document.createElement('div');
                        div.className = 'lyric-line';
                        div.textContent = text;
                        // Click to Sync Logic
                        div.onclick = () => player.currentTime = time;
                        lyricBox.appendChild(div);
                        syncData.push({ time, element: div });
                    }
                }
            });
        }

        const player = document.getElementById('audio-element');

        // AUTO-PLAY RANDOM SONG FROM SAME ALBUM
        player.onended = () => {
            if (currentAlbumSongs.length > 1) {
                const randomSong = currentAlbumSongs[Math.floor(Math.random() * currentAlbumSongs.length)];
                play(randomSong.id, randomSong.title, currentArtist);
            }
        };

        player.ontimeupdate = () => {
            if (!syncData.length) return;
            let activeIdx = -1;
            for (let i = 0; i < syncData.length; i++) {
                if (player.currentTime >= syncData[i].time) activeIdx = i;
                else break;
            }
            syncData.forEach((item, idx) => {
                if (idx === activeIdx) {
                    if (!item.element.classList.contains('active')) {
                        item.element.classList.add('active');
                        item.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else item.element.classList.remove('active');
            });
        };

        function filterLibrary() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = {};
            for (const artist in fullLibrary) {
                let artistMatches = artist.toLowerCase().includes(query);
                let tempAlbums = {};
                for (const album in fullLibrary[artist]) {
                    const songMatches = fullLibrary[artist][album].filter(s => s.title.toLowerCase().includes(query));
                    if (songMatches.length > 0 || artistMatches || album.toLowerCase().includes(query)) {
                        tempAlbums[album] = fullLibrary[artist][album];
                    }
                }
                if (Object.keys(tempAlbums).length > 0) filtered[artist] = tempAlbums;
            }
            renderLibrary(filtered);
        }

        init();
    </script>
</body>
</html>
